<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaalvoetbal (Spaargaren VS RoBo)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy:      #0b1628;
    --navy2:     #101f38;
    --navy3:     #162844;
    --panel:     #12203a;
    --border:    #1e3358;
    --border2:   #2a4570;
    --gold:      #c9973a;
    --gold-lt:   #e8b85a;
    --gold-dim:  #c9973a18;
    --text:      #dde6f0;
    --text-soft: #8aa0bb;
    --white:     #f4f8fc;
    --red:       #d94f4f;
    --divider:   #1a2f50;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #2a4570 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.20;
    pointer-events: none;
    z-index: 0;
  }
  #app { position: relative; z-index: 1; }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 88px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 200;
    box-shadow: 0 2px 28px #00000055;
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-emblem {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .logo-emblem img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
  }
  .logo-title {
    font-family: 'DM Serif Display', serif;
    font-size: 19px; color: var(--white); line-height: 1.1;
  }
  .logo-title .subtitle {
    font-style: normal; font-size: 19px;
    color: var(--white); font-family: 'DM Serif Display', serif;
  }
  .logo-title .vs-divider {
    font-size: 12px; color: var(--text-soft);
    font-family: 'DM Sans', sans-serif; font-weight: 600;
    letter-spacing: 1px; vertical-align: middle; margin: 0 4px;
  }
  .logo-season { font-size: 10px; color: var(--gold); letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; margin-top: 2px; }
  nav { display: flex; gap: 2px; }
  nav button {
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 13.5px;
    padding: 8px 16px; border: none; border-radius: 6px;
    background: transparent; color: var(--text-soft); cursor: pointer;
    transition: color .2s, background .2s;
  }
  nav button:hover { color: var(--text); background: var(--navy3); }
  nav button.active { color: var(--gold-lt); background: var(--gold-dim); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .badge-admin {
    background: var(--gold-dim); border: 1px solid #c9973a60;
    color: var(--gold-lt); font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 20px;
  }

  /* ── BUTTONS ─────────────────────────────────────── */
  .btn {
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 13.5px;
    padding: 8px 18px; border-radius: 7px; border: none;
    cursor: pointer; transition: all .18s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold-lt), var(--gold));
    color: #1a0e00; font-weight: 600;
  }
  .btn-gold:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px #c9973a38; }
  .btn-outline { background: transparent; color: var(--text-soft); border: 1px solid var(--border2); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold-lt); }
  .btn-ghost { background: var(--navy3); color: var(--text-soft); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid #d94f4f28; }
  .btn-danger:hover { background: #d94f4f12; }
  .btn-sm { padding: 5px 12px; font-size: 12.5px; }

  /* ── MAIN ────────────────────────────────────────── */
  main { max-width: 980px; margin: 0 auto; padding: 36px 28px; }

  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--divider);
    flex-wrap: wrap; gap: 12px;
  }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--white); line-height: 1; }
  .page-title em { font-style: normal; color: var(--gold); }

  /* ── TABS ────────────────────────────────────────── */
  .tabs {
    display: flex; gap: 6px; margin-bottom: 26px;
    padding-bottom: 12px; border-bottom: 1px solid var(--divider);
    flex-wrap: wrap;
  }
  .tab {
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 13px;
    padding: 7px 16px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; color: var(--text-soft); cursor: pointer; transition: all .18s;
  }
  .tab:hover { color: var(--text); background: var(--navy3); }
  .tab.active { background: var(--gold-dim); border-color: #c9973a45; color: var(--gold-lt); font-weight: 600; }

  /* ── CARD ────────────────────────────────────────── */
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 22px; margin-bottom: 14px; transition: border-color .2s; }
  .card:hover { border-color: var(--border2); }

  /* ── MATCH ───────────────────────────────────────── */
  .match-date-pill {
    background: var(--navy3); border: 1px solid var(--border2); border-radius: 20px;
    font-size: 12px; font-weight: 500; color: var(--text-soft); padding: 3px 12px;
    display: inline-block; margin-bottom: 16px;
  }
  .match-body { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .match-team { background: var(--navy2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .team-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .team-label.a { color: var(--gold); }
  .team-label.b { color: #7ab0d4; }
  .team-players { display: flex; flex-wrap: wrap; gap: 5px; }
  .player-chip { background: var(--navy3); border: 1px solid var(--border2); border-radius: 4px; padding: 3px 9px; font-size: 12px; color: var(--text); }
  .score-block { text-align: center; }
  .score-num { font-family: 'DM Serif Display', serif; font-size: 50px; color: var(--white); line-height: 1; letter-spacing: 2px; }
  .score-dash { color: var(--text-soft); }
  .score-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-soft); margin-top: 5px; }
  .match-scorers { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--divider); font-size: 12.5px; color: var(--text-soft); }
  .scorer-name { color: var(--text); font-weight: 500; }
  .match-actions { margin-top: 12px; display: flex; gap: 7px; }

  /* ── STATS ───────────────────────────────────────── */
  .stats-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .stats-table { width: 100%; border-collapse: collapse; }
  .stats-table th { font-size: 10.5px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: var(--text-soft); text-align: left; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--navy2); }
  .stats-table td { padding: 13px 18px; border-bottom: 1px solid var(--divider); font-size: 14px; vertical-align: middle; }
  .stats-table tr:last-child td { border-bottom: none; }
  .stats-table tbody tr { transition: background .15s; }
  .stats-table tbody tr:hover td { background: var(--navy3); }
  .rank-num { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--border2); width: 44px; text-align: center; }
  .rank-1 { color: #d4af37; } .rank-2 { color: #a8b2be; } .rank-3 { color: #b08050; }
  .p-name { font-weight: 600; font-size: 14.5px; color: var(--white); }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-track { height: 5px; background: var(--navy3); border-radius: 3px; width: 110px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--gold); }
  .bar-fill.blue { background: #5090c8; }
  .stat-val { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--gold-lt); min-width: 28px; }
  .stat-val.blue { color: #7ab0d4; }

  /* ── MODALS ──────────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; background: #00000095;
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(8px);
  }
  .login-box {
    background: var(--panel); border: 1px solid var(--border2);
    border-radius: 14px; padding: 44px 40px; width: 360px;
    box-shadow: 0 30px 80px #00000075; text-align: center;
  }
  .login-emblem {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(145deg, var(--gold-lt), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin: 0 auto 20px;
    box-shadow: 0 0 0 6px var(--gold-dim);
  }
  .login-box h2 { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--white); margin-bottom: 6px; }
  .login-box p { color: var(--text-soft); font-size: 13px; margin-bottom: 28px; }

  .modal-overlay {
    position: fixed; inset: 0; background: #00000090;
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 500; backdrop-filter: blur(5px);
    padding: 28px 16px; overflow-y: auto;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--border2);
    border-radius: 12px; padding: 32px; width: 100%; max-width: 620px;
    margin: auto; box-shadow: 0 24px 70px #00000070;
  }
  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--white); margin-bottom: 24px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--divider); }

  /* ── FORM ────────────────────────────────────────── */
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 7px; }
  input[type=text], input[type=password], input[type=date],
  input[type=number], select, textarea {
    width: 100%; background: var(--navy2); border: 1px solid var(--border2);
    border-radius: 7px; padding: 10px 13px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  input:focus, select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
  select option { background: var(--navy2); }
  .error-msg { color: var(--red); font-size: 13px; margin-top: 10px; }

  /* ── PLAYER GRID ─────────────────────────────────── */
  .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 6px; }
  .player-check {
    display: flex; align-items: center; gap: 8px;
    background: var(--navy2); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 12px; cursor: pointer;
    transition: all .18s; user-select: none; font-size: 13.5px;
  }
  .player-check:hover { border-color: var(--border2); }
  .player-check.selected { border-color: var(--gold); background: var(--gold-dim); color: var(--white); }
  .chk-box {
    width: 16px; height: 16px; border: 2px solid var(--border2);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 9px; flex-shrink: 0; transition: all .18s;
  }
  .player-check.selected .chk-box { background: var(--gold); border-color: var(--gold); color: #1a0e00; font-weight: 700; }

  /* ── SCORER ROWS ─────────────────────────────────── */
  .scorer-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 10px 12px; background: var(--navy2); border: 1px solid var(--border); border-radius: 7px; }
  .scorer-row select { flex: 1; }
  .scorer-row input[type=number] { width: 72px; }

  /* ── TIKKIE ──────────────────────────────────────── */
  .tikkie-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 9px; margin-bottom: 10px; transition: border-color .2s; }
  .tikkie-item:hover { border-color: var(--border2); }
  .tikkie-name { font-weight: 600; font-size: 15px; color: var(--white); }
  .tikkie-detail { font-size: 12.5px; color: var(--text-soft); margin-top: 2px; }
  .tikkie-amount { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--gold-lt); }
  .total-row { display: flex; justify-content: flex-end; align-items: center; gap: 14px; padding: 16px 20px; border-top: 1px solid var(--border2); margin-top: 6px; }
  .total-row span { font-size: 13px; color: var(--text-soft); }
  .total-amount { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--white); }

  /* ── SETTINGS ────────────────────────────────────── */
  .settings-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 28px; }

  /* ── EMPTY ───────────────────────────────────────── */
  .empty { text-align: center; padding: 70px 20px; color: var(--text-soft); }
  .empty-icon { font-size: 44px; margin-bottom: 16px; opacity: 0.32; }
  .empty p { font-size: 14.5px; line-height: 1.7; }

  /* ── LOADING ─────────────────────────────────────── */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 2000; gap: 20px;
  }
  .spinner {
    width: 44px; height: 44px; border-radius: 50%;
    border: 3px solid var(--border2);
    border-top-color: var(--gold);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-soft); font-size: 14px; letter-spacing: 0.3px; }

  /* ── BUSY INDICATOR (inline ops) ─────────────────── */
  .saving-indicator {
    position: fixed; top: 80px; right: 24px;
    background: var(--navy2); border: 1px solid var(--border2);
    color: var(--text-soft); font-size: 12.5px;
    padding: 8px 14px; border-radius: 7px; z-index: 300;
    display: none; align-items: center; gap: 8px;
  }
  .saving-indicator.show { display: flex; }
  .saving-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: pulse 1s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── NOTIF ───────────────────────────────────────── */
  .notif {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--navy2); border: 1px solid var(--gold);
    color: var(--gold-lt); font-size: 13.5px; font-weight: 500;
    padding: 12px 20px; border-radius: 8px; z-index: 9999;
    transform: translateY(80px); opacity: 0;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 8px 30px #00000060;
  }
  .notif.show { transform: translateY(0); opacity: 1; }

  /* ── RESPONSIVE ──────────────────────────────────── */
  @media (max-width: 640px) {
    header { height: auto; padding: 12px 18px; flex-wrap: wrap; gap: 10px; }
    .match-body { grid-template-columns: 1fr; }
    .score-num { font-size: 36px; }
    main { padding: 18px 12px; }
    .modal { padding: 20px 14px; }
    .login-box { padding: 36px 24px; width: 100%; }
    .bar-track { width: 50px; }

    /* Stats tables → compact op mobiel */
    .stats-table th, .stats-table td { padding: 10px 10px; font-size: 13px; }
    .stats-table th { font-size: 9.5px; letter-spacing: 1px; padding: 8px 10px; }
    .bar-row { gap: 6px; }

    /* Opkomst: verberg de bar op mobiel, toon alleen getallen */
    .bar-track { display: none; }
    .stat-val { font-size: 14px; }

    /* Topscorers: maak compacter */
    .stats-wrap { border-radius: 8px; }

    /* Kosten per speler */
    .tikkie-item { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
    .tikkie-amount { font-size: 15px; }

    /* Kosten samenvatting */
    .kosten-summary { gap: 8px; }
    .kosten-stat { padding: 10px 12px; min-width: 90px; }
    .kosten-val { font-size: 18px; }

    /* Extra kosten */
    .extra-cost-row { flex-direction: column; align-items: stretch; }
    .extra-desc-input { width: 100%; }

    /* Programma kaart */
    .schedule-vs { gap: 10px; padding: 12px 0 6px; }
    .schedule-vs-divider { font-size: 16px; }

    /* Been stats tabel */
    .foot-table-wrap table th:nth-child(2) { display: none; }
    .foot-table-wrap table td:nth-child(2) { display: none; }

    /* Admin spelers tabel: verberg been-kolom */
    .players-table-wrap .col-been { display: none; }

    /* Settings card */
    .settings-card { padding: 16px 14px; }
  }

  .stand-table th, .stand-table td { text-align: center; }
  .stand-table th:nth-child(2), .stand-table td:nth-child(2) { text-align: left; }
  .stand-table thead th { font-size: 11px; letter-spacing: .5px; cursor: default; }

  .schedule-card { position: relative; }
  .schedule-vs {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; padding: 18px 0 8px; flex-wrap: wrap;
  }
  .schedule-vs-divider {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--gold); font-weight: 700;
  }
  .schedule-badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 20px;
    background: var(--panel2); color: var(--text-soft);
    margin-bottom: 4px;
  }
  .schedule-badge.today { background: #c9973a33; color: var(--gold); }
  .schedule-badge.soon  { background: #4caf7d22; color: #4caf7d; }

  .foot-badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 12px; margin-left: 6px;
    vertical-align: middle;
  }
  .foot-badge.gold  { background: #c9973a33; color: var(--gold); }
  .foot-badge.green { background: #4caf7d22; color: #4caf7d; }

  .kosten-summary {
    display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .kosten-stat {
    flex: 1; min-width: 120px;
    background: var(--navy3); border: 1px solid var(--border2);
    border-radius: 10px; padding: 14px 18px;
  }
  .kosten-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 4px; }
  .kosten-val   { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--white); }

  .extra-cost-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .extra-desc-input {
    flex: 1; min-width: 160px;
    background: var(--input-bg, #0e1e38); border: 1px solid var(--border); color: var(--white);
    border-radius: 8px; padding: 9px 12px; font-size: 14px;
  }
  .extra-amt-input {
    background: var(--input-bg, #0e1e38); border: 1px solid var(--border); color: var(--white);
    border-radius: 8px; padding: 9px 12px; font-size: 14px;
  }

  .pay-check-label {
    display: flex; align-items: center; gap: 12px; cursor: pointer; flex: 1;
  }
  .pay-check-label input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer; flex-shrink: 0;
  }
  .tikkie-item.paid { opacity: 0.55; }
  .tikkie-amount.paid { color: #4caf7d !important; }

  /* Stand kaarten */
  .stand-card {
    background: var(--panel2); border: 1px solid var(--border2);
    border-radius: 14px; padding: 18px; margin-bottom: 14px;
  }
  .stand-card.stand-leader {
    border-color: var(--gold); box-shadow: 0 0 0 1px #c9973a44, 0 4px 24px #c9973a18;
  }
  .stand-card-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .stand-pos {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--navy3); color: var(--gold);
    font-family: 'DM Serif Display', serif; font-size: 16px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .stand-leader .stand-pos { background: var(--gold); color: var(--navy1); }
  .stand-team-name {
    flex: 1; font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--white);
  }
  .stand-pts-big {
    font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--gold);
  }
  .stand-card-stats {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
  }
  @media (max-width: 480px) {
    .stand-card-stats { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  }
  .stand-stat-cell {
    background: var(--navy3); border-radius: 8px;
    padding: 10px 4px; text-align: center;
  }
  .stand-stat-cell.won  .stand-stat-val { color: #4caf7d; }
  .stand-stat-cell.draw .stand-stat-val { color: var(--gold); }
  .stand-stat-cell.lost .stand-stat-val { color: #e05a5a; }
  .stand-stat-val { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--white); line-height: 1; }
  .stand-stat-lbl { font-size: 10px; color: var(--text-soft); margin-top: 4px; line-height: 1.3; }
  .stand-pct      { font-size: 10px; color: var(--text-soft); }

  /* Kolommen verbergen op mobiel */
  @media (max-width: 640px) {
    .col-hide-sm   { display: none; }
    .col-been      { display: none; }
    .foot-stats-table td:nth-child(2), .foot-stats-table th:nth-child(2) { display: none; }
  }

  .season-select {
    background: var(--navy3); border: 1px solid var(--border2);
    color: var(--white); border-radius: 8px; padding: 6px 10px;
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; max-width: 180px;
  }
  .season-select:focus { outline: none; border-color: var(--gold); }

  /* Kosten breakdown tabel */
  .kosten-breakdown { background: var(--navy3); border-radius: 10px; overflow: hidden; margin-bottom: 4px; }
  .kosten-row { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 14px; border-bottom: 1px solid var(--divider); }
  .kosten-row:last-child { border-bottom: none; }
  .kosten-row.total { font-weight: 700; color: var(--white); background: var(--panel2); }

  /* ── MVP ─────────────────────────────────────────── */
  .mvp-legend {
    display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px;
    color: var(--text-soft); margin-bottom: 20px; padding: 10px 14px;
    background: var(--navy3); border-radius: 8px;
  }
  .mvp-legend em { color: var(--gold); font-style: normal; font-weight: 700; }
  .mvp-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  }
  .mvp-row.mvp-leader {
    border-color: var(--gold); background: var(--panel2);
    box-shadow: 0 0 0 1px #c9973a33;
  }
  .mvp-rank {
    font-size: 22px; min-width: 32px; text-align: center;
    font-family: 'DM Serif Display', serif; color: var(--text-soft);
  }
  .mvp-info { flex: 1; }
  .mvp-name { font-weight: 700; font-size: 15px; color: var(--white); margin-bottom: 7px; }
  .mvp-bar-track {
    height: 6px; background: var(--navy3); border-radius: 4px;
    margin-bottom: 6px; overflow: hidden;
  }
  .mvp-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--gold), #e8b85a);
    border-radius: 4px; transition: width .4s ease;
  }
  .mvp-breakdown { display: flex; gap: 12px; font-size: 11px; color: var(--text-soft); flex-wrap: wrap; }
  .mvp-breakdown span { cursor: default; }
  .mvp-score {
    font-family: 'DM Serif Display', serif; font-size: 32px;
    color: var(--gold); min-width: 52px; text-align: right;
  }
  .mvp-leader .mvp-score { color: #f0c060; }

  /* ── MOBIEL AANVULLINGEN (max 640px) ─────────────── */
  @media (max-width: 640px) {

    /* Tabs: kleiner lettertype zodat ze passen */
    .tab { font-size: 11px; padding: 7px 11px; letter-spacing: .3px; }

    /* Seizoen dropdown in nav */
    .season-select { max-width: 140px; font-size: 11px; padding: 5px 8px; }

    /* Stand kaart: kleinere punten en teamnaam */
    .stand-card { padding: 14px 12px; }
    .stand-card-header { gap: 8px; margin-bottom: 12px; }
    .stand-team-name { font-size: 15px; }
    .stand-pts-big { font-size: 20px; }
    .stand-stat-val { font-size: 16px; }
    .stand-stat-lbl { font-size: 9px; }

    /* MVP: score kleiner, breakdown compacter */
    .mvp-row { padding: 12px 12px; gap: 10px; }
    .mvp-score { font-size: 24px; min-width: 40px; }
    .mvp-name { font-size: 14px; margin-bottom: 5px; }
    .mvp-breakdown { gap: 8px; font-size: 10px; }
    .mvp-legend { font-size: 11px; gap: 8px; padding: 8px 10px; }

    /* Kosten breakdown */
    .kosten-breakdown { font-size: 13px; }
    .kosten-row { padding: 9px 12px; font-size: 13px; }
    .kosten-val { font-size: 18px; }
    .kosten-stat { padding: 10px 12px; }

    /* Voorkeur (foot stats tabel) */
    .foot-stats-table th, .foot-stats-table td { font-size: 12px; padding: 9px 8px; }

    /* Opkomst tabel */
    .stats-table td.p-name, .stats-table th:nth-child(2) { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  }

  @media (max-width: 380px) {
    /* Hele kleine schermen: nog iets meer comprimeren */
    .mvp-row { flex-wrap: wrap; }
    .mvp-score { min-width: 100%; text-align: left; font-size: 20px; }
    .stand-card-stats { grid-template-columns: repeat(4, 1fr); }
    .tab { font-size: 10px; padding: 6px 8px; }
  }

  /* ── Seizoenen beheer ─────────────────────────────── */
  .season-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 14px 16px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .season-row.season-active { border-color: var(--gold); }
  .season-row-info { flex: 1; min-width: 0; }
  .season-row-name { font-weight: 600; font-size: 15px; color: var(--white); margin-bottom: 4px; }
  .season-row-meta { font-size: 12px; color: var(--text-soft); }
  .season-row-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .season-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    background: #c9973a33; color: var(--gold);
    padding: 2px 7px; border-radius: 10px; vertical-align: middle; margin-left: 6px;
  }
  @media (max-width: 640px) {
    .season-row { flex-direction: column; align-items: flex-start; }
    .season-row-actions { width: 100%; }
  }

  /* Radio knop huidig seizoen */
  .season-current-label {
    display: flex; align-items: center; cursor: pointer;
    flex-shrink: 0; padding: 4px;
  }
  .season-current-label input[type="radio"] { display: none; }
  .season-radio-dot {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border2); background: var(--navy3);
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, background .2s;
    flex-shrink: 0;
  }
  .season-current-label input[type="radio"]:checked + .season-radio-dot {
    border-color: var(--gold); background: var(--gold);
    box-shadow: 0 0 0 3px #c9973a33;
  }
  .season-current-label:hover .season-radio-dot { border-color: var(--gold); }

  /* ── Import sectie ─────────────────────────────────── */
  .import-code {
    background: var(--navy3); color: var(--gold);
    padding: 1px 6px; border-radius: 4px; font-size: 12px;
    font-family: monospace;
  }
  .import-example { background: var(--navy3); border-radius: 8px; padding: 12px 14px; margin-top:4px; }
  .import-pre {
    font-family: monospace; font-size: 11px; color: var(--text-soft);
    white-space: pre-wrap; word-break: break-all; margin: 0;
  }
  .import-errors {
    background: #e05a5a18; border: 1px solid #e05a5a44;
    border-radius: 8px; padding: 12px 14px; margin-bottom: 12px;
  }
  .import-error-row { font-size: 12px; color: #e08a8a; margin-top: 4px; }
  .import-error { color: #e05a5a; font-size: 13px; }
</style>

const getStats = () => {

async function loadAll() {
  const [
    { data: players,      error: e1 },
    { data: allMatches,   error: e2 },
    { data: matchPlayers, error: e3 },
    { data: matchScorers, error: e4 },
    { data: settings,     error: e5 },
    { data: seasons,      error: e6 }
  ] = await Promise.all([
    sb.from('players').select('*').order('name'),
    sb.from('matches').select('*').order('date', { ascending: false }),
    sb.from('match_players').select('*'),
    sb.from('match_scorers').select('*'),
    sb.from('settings').select('*'),
    sb.from('seasons').select('*').order('created_at', { ascending: false })
  ]);

  if (e1 || e2 || e3 || e4 || e5) {
    const err = e1 || e2 || e3 || e4 || e5;
    showConfigError(err.message);
    return false;
  }
  if (e6) console.warn('Seasons tabel niet beschikbaar:', e6.message);

  // ── 1. Settings eerst zodat alles erna beschikbaar is ──
  const settingsMap = {};
  (settings || []).forEach(s => { settingsMap[s.key] = s.value; });

  // ── 2. Seizoenen ──
  cache.seasons = seasons || [];
  const storedCurrentId    = settingsMap['current_season_id'];
  const storedSeasonExists = storedCurrentId && cache.seasons.some(s => s.id === storedCurrentId);
  if (storedSeasonExists) {
    cache.currentSeasonId = storedCurrentId;
  } else if (!cache.currentSeasonId && cache.seasons.length) {
    cache.currentSeasonId = cache.seasons[0].id;
  }

  // ── 3. Filter wedstrijden op seizoen ──
  const viewSeasonId = S.selectedSeasonId || cache.currentSeasonId;
  const filteredMatches = cache.seasons.length > 0 && viewSeasonId
    ? (allMatches || []).filter(m => m.season_id === viewSeasonId)
    : (allMatches || []);

  // ── 4. Spelers en wedstrijden in cache ──
  cache.players      = players || [];
  cache.allMatchesRaw = allMatches || [];
  cache.matches = filteredMatches.map(m => ({
    id:    m.id,
    date:  m.date,
    teamA: { goals: m.goals_a, players: (matchPlayers||[]).filter(mp => mp.match_id===m.id && mp.team==='A').map(mp=>mp.player_id) },
    teamB: { goals: m.goals_b, players: (matchPlayers||[]).filter(mp => mp.match_id===m.id && mp.team==='B').map(mp=>mp.player_id) },
    scorers: (matchScorers||[]).filter(ms => ms.match_id===m.id).map(ms=>({ playerId: ms.player_id, goals: ms.goals }))
  }));

  // ── 5. Overige settings ──
  const activeSeason = cache.seasons.find(s => s.id === (S.selectedSeasonId || cache.currentSeasonId));
  cache.season          = activeSeason?.name || settingsMap['season'] || 'Seizoen 2024-2025';
  cache.pricePerSession = parseFloat(settingsMap['price_per_session']) || 5.00;
  cache.seasonCost      = parseFloat(settingsMap['season_cost'])       || 0;
  cache.seasonPaid      = parseFloat(settingsMap['season_paid'])       || 0;
  try { cache.extraCosts   = JSON.parse(settingsMap['extra_costs']   || '[]'); } catch(e) { cache.extraCosts   = []; }
  try { cache.paymentsPaid = JSON.parse(settingsMap['payments_paid'] || '[]'); } catch(e) { cache.paymentsPaid = []; }
  return true;
}


async function dbAddPlayer(name, foot='rechts') {
  const { error } = await sb.from('players').insert({ name, foot });
  if (error) throw error;
}
async function dbUpdatePlayer(id, name, foot='rechts') {
  const { error } = await sb.from('players').update({ name, foot }).eq('id', id);
  if (error) throw error;
}
async function dbDeletePlayer(id) {
  const { error } = await sb.from('players').delete().eq('id', id);
  if (error) throw error;
}

async function dbSaveMatch(data, existingId = null) {
  let matchId = existingId;
  if (existingId) {
    const { error } = await sb.from('matches').update({ date: data.date, goals_a: data.goalsA, goals_b: data.goalsB }).eq('id', existingId);
    if (error) throw error;
    await sb.from('match_players').delete().eq('match_id', existingId);
    await sb.from('match_scorers').delete().eq('match_id', existingId);
  } else {
    const { data: row, error } = await sb.from('matches').insert({ date: data.date, goals_a: data.goalsA, goals_b: data.goalsB, season_id: cache.currentSeasonId }).select().single();
    if (error) throw error;
    matchId = row.id;
  }
  const mpRows = [
    ...data.playersA.map(pid => ({ match_id: matchId, player_id: pid, team: 'A' })),
    ...data.playersB.map(pid => ({ match_id: matchId, player_id: pid, team: 'B' }))
  ];
  if (mpRows.length) await sb.from('match_players').insert(mpRows);
  const scRows = data.scorers.map(s => ({ match_id: matchId, player_id: s.playerId, goals: s.goals }));
  if (scRows.length) await sb.from('match_scorers').insert(scRows);
}

async function dbDeleteMatch(id) {
  const { error } = await sb.from('matches').delete().eq('id', id);
  if (error) throw error;
}

async function dbSaveSetting(key, value) {
  const { error } = await sb.from('settings').upsert({ key, value: String(value) });
  if (error) throw error;
}

  } catch (err) {
    notify('Fout: ' + err.message);
    console.error(err);
  } finally {
    setSaving(false);
  }
}

const nb = (page, lbl) =>
  `<button class="nav-btn${S.page===page?' active':''}" data-page="${page}">${lbl}</button>`;

// ── RESULTS ───────────────────────────────────────────
const pageResults = () => {
  const today = new Date(); today.setHours(0,0,0,0);
  const played   = [...cache.matches].filter(m => new Date(m.date) < today || (m.goalsA != null && m.goalsB != null && new Date(m.date) <= today))
                    .sort((a,b) => new Date(b.date) - new Date(a.date));
  const upcoming = [...cache.matches].filter(m => new Date(m.date) >= today && (m.goalsA == null || m.goalsB == null))
                    .sort((a,b) => new Date(a.date) - new Date(b.date));
  const tab = S.resultsTab;
  return `
    <div class="page-header">
      <div class="page-title">${tab==='uitslagen'
        ? `Uitslagen${played.length ? ` <em style="font-size:20px">${played.length} gespeeld</em>` : ''}`
        : `Programma${upcoming.length ? ` <em style="font-size:20px">${upcoming.length} gepland</em>` : ''}`}
      </div>
    </div>
    <div class="tabs">
      <button class="tab${tab==='uitslagen'?' active':''}" data-rtab="uitslagen">Uitslagen</button>
      <button class="tab${tab==='programma'?' active':''}" data-rtab="programma">Programma</button>
    </div>
    ${tab==='uitslagen'
      ? (!played.length
          ? `<div class="empty"><div class="empty-icon">🏟️</div><p>Nog geen wedstrijden gespeeld.<br>Kom terug na woensdag!</p></div>`
          : played.map(matchCard).join(''))
      : (!upcoming.length
          ? `<div class="empty"><div class="empty-icon">📅</div><p>Geen geplande wedstrijden.<br>Voeg ze toe via Beheer.</p></div>`
          : upcoming.map(scheduleCard).join(''))}`;
};

const scheduleCard = m => {
  const actions = S.isAdmin ? `<div class="match-actions">
    <button class="btn btn-ghost btn-sm" data-edit-match="${m.id}">Bewerken</button>
    <button class="btn btn-danger btn-sm" data-delete-match="${m.id}">Verwijderen</button>
  </div>` : '';
  const d = new Date(m.date);
  const daysLeft = Math.ceil((d - new Date().setHours(0,0,0,0)) / 86400000);
  const badge = daysLeft === 0 ? '<span class="schedule-badge today">Vandaag!</span>'
              : daysLeft === 1 ? '<span class="schedule-badge soon">Morgen</span>'
              : daysLeft <= 7  ? `<span class="schedule-badge soon">Over ${daysLeft} dagen</span>`
              :                  '<span class="schedule-badge">' + daysLeft + ' dagen</span>';
  return `
  <div class="card schedule-card">
    <span class="match-date-pill">${fmtDate(m.date)}</span>
    ${badge}
    <div class="schedule-vs">
      <span class="team-label a">Team Spaargaren</span>
      <span class="schedule-vs-divider">VS</span>
      <span class="team-label b">Team RoBo</span>
    </div>
    ${actions}
  </div>`;
};

const matchCard = m => {
  const chips = pids => (pids||[]).map(pid=>`<span class="player-chip">${pName(pid)}</span>`).join('');
  const scorersHtml = (m.scorers||[]).length
    ? `<div class="match-scorers">⚽&ensp;${m.scorers.map(s=>
        `<span class="scorer-name">${pName(s.playerId)}</span>${s.goals>1?` (${s.goals}×)`:''}`
      ).join('&ensp;·&ensp;')}</div>` : '';
  const actions = S.isAdmin ? `<div class="match-actions">
    <button class="btn btn-ghost btn-sm" data-edit-match="${m.id}">Bewerken</button>
    <button class="btn btn-danger btn-sm" data-delete-match="${m.id}">Verwijderen</button>
  </div>` : '';
  return `
  <div class="card">
    <span class="match-date-pill">${fmtDate(m.date)}</span>
    <div class="score-block" style="margin-bottom:16px">
      <div class="score-num">${m.teamA.goals??0}<span class="score-dash"> – </span>${m.teamB.goals??0}</div>
      <div class="score-lbl">eindstand</div>
    </div>
    <div class="match-body">
      <div class="match-team">
        <div class="team-label a">Team Spaargaren</div>
      </div>
      <div class="match-team">
        <div class="team-label b">Team RoBo</div>
        <div class="team-players">${chips(m.teamB.players)||'<span style="color:var(--text-soft);font-size:13px">—</span>'}</div>
      </div>
    </div>
    ${scorersHtml}${actions}
  </div>`;
};

// ── STATS ─────────────────────────────────────────────
const pageStats = () => {
  const tab = S.statsTab;
  return `
  <div class="page-header"><div class="page-title">Statistieken</div></div>
  <div class="tabs" style="flex-wrap:wrap">
    <button class="tab${tab==='stand'?'     active':''}" data-stab="stand">Stand</button>
    <button class="tab${tab==='scorers'?'   active':''}" data-stab="scorers">Topscorers</button>
    <button class="tab${tab==='mvp'?'       active':''}" data-stab="mvp">MVP</button>
    <button class="tab${tab==='voorkeur'?'  active':''}" data-stab="voorkeur">Voorkeur</button>
    <button class="tab${tab==='attendance'?' active':''}" data-stab="attendance">Opkomst</button>
    <button class="tab${tab==='kosten'?'    active':''}" data-stab="kosten">Kosten</button>
  </div>
  ${tab==='stand'      ? tblStand()      :
    tab==='scorers'    ? tblScorers()    :
    tab==='mvp'        ? tblMVP()        :
    tab==='voorkeur'   ? tblVoorkeur()   :
    tab==='kosten'     ? tblKosten()     :
                         tblAttendance()}`;
};

const tblStand = () => {
  // Alleen gespeelde wedstrijden (score is ingevuld en datum is geweest)
  const today = new Date(); today.setHours(0,0,0,0);
  const ms = cache.matches.filter(m =>
    new Date(m.date) < today &&
    m.teamA.goals != null && m.teamB.goals != null
  );

  if (!ms.length) return `<div class="empty"><div class="empty-icon">🏆</div><p>Nog geen gespeelde wedstrijden.</p></div>`;

  let teams = [
    { name: 'Team Spaargaren', played:0, won:0, lost:0, draw:0, gf:0, ga:0 },
    { name: 'Team RoBo',       played:0, won:0, lost:0, draw:0, gf:0, ga:0 }
  ];

  ms.forEach(m => {
    const a = m.teamA.goals ?? 0;
    const b = m.teamB.goals ?? 0;
    teams[0].played++; teams[1].played++;
    teams[0].gf += a;  teams[0].ga += b;
    teams[1].gf += b;  teams[1].ga += a;
    if      (a > b) { teams[0].won++;  teams[1].lost++; }
    else if (b > a) { teams[1].won++;  teams[0].lost++; }
    else            { teams[0].draw++; teams[1].draw++; }
  });

  // Sorteer op punten, dan doelsaldo
  teams.sort((a,b) => {
    const pa = a.won*3+a.draw, pb = b.won*3+b.draw;
    if (pb !== pa) return pb - pa;
    return (b.gf-b.ga) - (a.gf-a.ga);
  });

  const pct  = (n, total) => total ? Math.round(n/total*100)+'%' : '—';
  const sign  = n => (n >= 0 ? '+' : '') + n;

  const standCards = teams.map((t, i) => {
    const pts = t.won*3 + t.draw;
    const isLeader = i === 0;
    return `
    <div class="stand-card ${isLeader ? 'stand-leader' : ''}">
      <div class="stand-card-header">
        <span class="stand-pos">${i+1}</span>
        <span class="stand-team-name">${t.name}</span>
        <span class="stand-pts-big">${pts} <span style="font-size:13px;color:var(--text-soft)">pnt</span></span>
      </div>
      <div class="stand-card-stats">
        <div class="stand-stat-cell">
          <div class="stand-stat-val">${t.played}</div>
          <div class="stand-stat-lbl">Gespeeld</div>
        </div>
        <div class="stand-stat-cell won">
          <div class="stand-stat-val">${t.won}</div>
          <div class="stand-stat-lbl">Gewonnen<br><span class="stand-pct">${pct(t.won,t.played)}</span></div>
        </div>
        <div class="stand-stat-cell draw">
          <div class="stand-stat-val">${t.draw}</div>
          <div class="stand-stat-lbl">Gelijk<br><span class="stand-pct">${pct(t.draw,t.played)}</span></div>
        </div>
        <div class="stand-stat-cell lost">
          <div class="stand-stat-val">${t.lost}</div>
          <div class="stand-stat-lbl">Verloren<br><span class="stand-pct">${pct(t.lost,t.played)}</span></div>
        </div>
        <div class="stand-stat-cell">
          <div class="stand-stat-val">${t.gf}</div>
          <div class="stand-stat-lbl">Goals<br>voor</div>
        </div>
        <div class="stand-stat-cell">
          <div class="stand-stat-val" style="color:var(--text-soft)">${t.ga}</div>
          <div class="stand-stat-lbl">Goals<br>tegen</div>
        </div>
        <div class="stand-stat-cell">
          <div class="stand-stat-val" style="color:${(t.gf-t.ga)>=0?'#4caf7d':'#e05a5a'}">${sign(t.gf-t.ga)}</div>
          <div class="stand-stat-lbl">Doel<br>saldo</div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="stats-wrap">${standCards}</div>`;
};

const footStats = (playedMs) => {
  const allStats = getStats();
  // Gebruik gefilterde wedstrijden indien meegegeven, anders zelf filteren
  const today = new Date(); today.setHours(0,0,0,0);
  const ms = playedMs || cache.matches.filter(m =>
    new Date(m.date) < today && m.teamA.goals != null && m.teamB.goals != null
  );
  if (!ms.length || !allStats.length) return '';

  // Spelers per been-type die hebben meegespeeld
  const feet = { rechts: { label: 'Rechtsbenig', emoji: '⚽', spelers: [], goals: 0, won: 0, gespeeld: 0 },
                 links:  { label: 'Linksbenig',  emoji: '⚽', spelers: [], goals: 0, won: 0, gespeeld: 0 },
                 twee:   { label: 'Tweebenig',   emoji: '⚽⚽', spelers: [], goals: 0, won: 0, gespeeld: 0 } };

  // Bouw map: playerId → foot
  const footMap = {};
  cache.players.forEach(p => { footMap[p.id] = p.foot || 'rechts'; });

  // Per wedstrijd: wie won, welk been droeg bij
  ms.forEach(m => {
    const winnerTeam = m.teamA.goals > m.teamB.goals ? 'A' : m.teamB.goals > m.teamA.goals ? 'B' : null;
    const allPlayers = [...(m.teamA?.players||[]).map(id=>({id,team:'A'})),
                        ...(m.teamB?.players||[]).map(id=>({id,team:'B'}))];
    allPlayers.forEach(({id, team}) => {
      const f = footMap[id]; if (!feet[f]) return;
      feet[f].gespeeld++;
      if (winnerTeam && team === winnerTeam) feet[f].won++;
    });
    (m.scorers||[]).forEach(sc => {
      const f = footMap[sc.playerId]; if (!feet[f]) return;
      feet[f].goals += sc.goals || 0;
    });
  });

  // Unieke spelers per been
  allStats.forEach(s => {
    const f = footMap[s.id]; if (!feet[f]) return;
    if (s.played > 0) feet[f].spelers.push(s.name);
  });

  // Meeste doelpunten / meeste wins
  const maxGoals  = Math.max(...Object.values(feet).map(f=>f.goals));
  const maxWon    = Math.max(...Object.values(feet).map(f=>f.won));

  const rows = Object.entries(feet).map(([key, f]) => {
    const winPct = f.gespeeld ? Math.round(f.won/f.gespeeld*100) : 0;
    const goalBadge = f.goals === maxGoals && maxGoals > 0 ? ' <span class="foot-badge gold">⭐ meeste goals</span>' : '';
    const winBadge  = f.won   === maxWon   && maxWon   > 0 ? ' <span class="foot-badge green">🏆 meeste wins</span>' : '';
    return `<tr>
      <td style="font-weight:600">${f.label} ${f.emoji}</td>
      <td class="col-hide-sm" style="color:var(--text-soft);font-size:13px">${f.spelers.length} speler${f.spelers.length!==1?'s':''}</td>
      <td><span class="stat-val">${f.goals}</span>${goalBadge}</td>
      <td><span class="stat-val" style="color:#4caf7d">${f.won}</span>
          <span style="color:var(--text-soft);font-size:11px;margin-left:4px">${winPct}%</span>${winBadge}</td>
    </tr>`;
  }).join('');

  return `<div style="margin-top:28px">
    <div style="font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Been-statistieken</div>
    <table class="stats-table foot-stats-table">
      <thead><tr>
        <th>Been</th><th class="col-hide-sm">Spelers</th><th>Doelpunten</th><th>Wedstr. gewonnen</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
};

// ── MVP ───────────────────────────────────────────────
const tblMVP = () => {
  const today = new Date(); today.setHours(0,0,0,0);
  const playedMs = cache.matches.filter(m =>
    new Date(m.date) < today && m.teamA.goals != null && m.teamB.goals != null
  );
  const totalMatches = playedMs.length;
  if (!totalMatches) return `<div class="empty"><div class="empty-icon">🏅</div><p>Nog geen gespeelde wedstrijden.</p></div>`;

  const stats = getStats();
  if (!stats.length) return `<div class="empty"><div class="empty-icon">🏅</div><p>Voeg spelers toe om MVP te berekenen.</p></div>`;

  // Per speler: aantal gewonnen wedstrijden
  const winsMap = {};
  stats.forEach(s => { winsMap[s.id] = 0; });
  playedMs.forEach(m => {
    const winTeam = m.teamA.goals > m.teamB.goals ? m.teamA.players
                  : m.teamB.goals > m.teamA.goals ? m.teamB.players : [];
    winTeam.forEach(pid => { if (winsMap[pid] !== undefined) winsMap[pid]++; });
  });

  const players = stats.map(s => {
    const played  = s.played;
    const goals   = s.goals;
    const wins    = winsMap[s.id] || 0;

    // Normaliseer elk component naar 0-100
    // C1: aanwezigheid (gespeeld / totaal wedstrijden) * 100, gewicht 3
    const c1 = totalMatches > 0 ? (played / totalMatches) * 100 : 0;
    // C2: scorend vermogen (goals / gespeeld) — cap op 2 goals p/w = 100
    const c2 = played > 0 ? Math.min((goals / played) / 2 * 100, 100) : 0;
    // C3: winratio (wins / gespeeld) * 100, gewicht 1
    const c3 = played > 0 ? (wins / played) * 100 : 0;

    const score = Math.round((c1 * 3 + c2 * 2 + c3 * 1) / 6);
    return { ...s, wins, c1: Math.round(c1), c2: Math.round(c2), c3: Math.round(c3), score };
  }).filter(s => s.played > 0).sort((a,b) => b.score - a.score);

  if (!players.length) return `<div class="empty"><div class="empty-icon">🏅</div><p>Nog geen deelnames geregistreerd.</p></div>`;

  const mvp = players[0];

  const rows = players.map((p, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
    const barW  = Math.round(p.score);
    return `<div class="mvp-row ${i===0?'mvp-leader':''}">
      <div class="mvp-rank">${medal || (i+1)}</div>
      <div class="mvp-info">
        <div class="mvp-name">${p.name}</div>
        <div class="mvp-bar-track"><div class="mvp-bar-fill" style="width:${barW}%"></div></div>
        <div class="mvp-breakdown">
          <span title="Aanwezigheid (×3)">👟 ${p.c1}%</span>
          <span title="Scorend vermogen (×2)">⚽ ${p.c2}%</span>
          <span title="Winratio (×1)">🏆 ${p.c3}%</span>
        </div>
      </div>
      <div class="mvp-score">${p.score}</div>
    </div>`;
  }).join('');

  return `<div style="padding:4px 0">
    <div class="mvp-legend">
      <span>👟 Aanwezigheid <em>×3</em></span>
      <span>⚽ Scorend vermogen <em>×2</em></span>
      <span>🏆 Winratio <em>×1</em></span>
      <span style="color:var(--gold)">Score = gewogen gemiddelde (0–100)</span>
    </div>
    ${rows}
  </div>`;
};

const parseImportRows = (rows) => {
  // rows: array of objects with keys from header row
  // Normalize header keys: trim + lowercase + replace spaces with _
  const normalize = s => s?.toString().trim().toLowerCase().replace(/\s+/g, '_').replace(/-/g, '_');

  const results = [];
  const errors  = [];

  rows.forEach((raw, i) => {
    const row = {};
    Object.entries(raw).forEach(([k, v]) => { row[normalize(k)] = v?.toString().trim(); });

    const lineNum = i + 2; // header = row 1
    const dateRaw = row['datum'] || row['date'];
    const goalsA  = parseInt(row['doelpunten_spaargaren'] ?? row['goals_spaargaren'] ?? row['goals_a'] ?? 0);
    const goalsB  = parseInt(row['doelpunten_robo']       ?? row['goals_robo']       ?? row['goals_b'] ?? 0);
    const spelersRaw = row['spelers_robo'] || row['spelers'] || '';
    const scorersRaw = row['scorers_robo'] || row['scorers'] || '';

    // Parse date (YYYY-MM-DD or DD-MM-YYYY or DD/MM/YYYY)
    let date = null;
    if (dateRaw) {
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateRaw)) {
        date = dateRaw;
      } else if (/^\d{1,2}[-\/]\d{1,2}[-\/]\d{4}$/.test(dateRaw)) {
        const parts = dateRaw.split(/[-\/]/);
        date = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
      } else if (typeof dateRaw === 'number') {
        // Excel serial date
        const excelDate = new Date(Date.UTC(1899, 11, 30) + dateRaw * 86400000);
        date = excelDate.toISOString().split('T')[0];
      }
    }
    if (!date) { errors.push(`Rij ${lineNum}: ongeldige datum "${dateRaw}"`); return; }
    if (isNaN(goalsA) || isNaN(goalsB)) { errors.push(`Rij ${lineNum}: ongeldige score`); return; }

    // Spelers RoBo: "Jan Bakker,Piet Smit" -> player IDs
    const spelersNames = spelersRaw ? spelersRaw.split(',').map(n => n.trim()).filter(Boolean) : [];
    const playersBId   = [];
    const missingPlayers = [];
    spelersNames.forEach(name => {
      const p = cache.players.find(p => p.name.toLowerCase() === name.toLowerCase());
      if (p) playersBId.push(p.id);
      else missingPlayers.push(name);
    });
    if (missingPlayers.length) {
      errors.push(`Rij ${lineNum}: speler(s) niet gevonden: ${missingPlayers.join(', ')}`);
      return;
    }

    // Scorers: "Jan Bakker:2,Piet Smit:1" -> [{playerId, goals}]
    const scorers = [];
    if (scorersRaw) {
      const scorerParts = scorersRaw.split(',').map(s => s.trim()).filter(Boolean);
      for (const part of scorerParts) {
        const [name, goalsStr] = part.split(':');
        const goals = parseInt(goalsStr) || 1;
        const p = cache.players.find(p => p.name.toLowerCase() === name.trim().toLowerCase());
        if (!p) { errors.push(`Rij ${lineNum}: scorer "${name.trim()}" niet gevonden`); return; }
        scorers.push({ playerId: p.id, goals });
      }
    }

    results.push({ date, goalsA, goalsB, playersA: [], playersB: playersBId, scorers });
  });

  return { results, errors };
};

const loadSheetJS = () => new Promise((resolve, reject) => {
  if (window.XLSX) return resolve();
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = resolve;
  s.onerror = reject;
  document.head.appendChild(s);
});

const handleImportFile = async (file) => {
  const preview = eid('importPreview');
  preview.innerHTML = '<div style="color:var(--text-soft);font-size:13px">Bestand inlezen…</div>';

  let rows = [];
  try {
    if (file.name.endsWith('.csv')) {
      const text = await file.text();
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
      rows = lines.slice(1).filter(l => l.trim()).map(line => {
        // Handle quoted fields
        const vals = [];
        let cur = '', inQ = false;
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
          else cur += ch;
        }
        vals.push(cur.trim());
        const obj = {};
        headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
        return obj;
      });
    } else {
      // Excel — laad SheetJS dynamisch
      await loadSheetJS();
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, { type: 'array', cellDates: false });
      const ws  = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    }
  } catch(e) {
    preview.innerHTML = `<div class="import-error">Fout bij inlezen: ${e.message}</div>`;
    return;
  }

  if (!rows.length) { preview.innerHTML = '<div class="import-error">Geen rijen gevonden in bestand.</div>'; return; }

  const { results, errors } = parseImportRows(rows);

  const errorHtml = errors.length ? `
    <div class="import-errors">
      <div style="font-size:12px;font-weight:700;color:#e05a5a;margin-bottom:6px">⚠️ ${errors.length} fout(en)</div>
      ${errors.map(e => `<div class="import-error-row">${e}</div>`).join('')}
    </div>` : '';

  if (!results.length) {
    preview.innerHTML = errorHtml + '<div class="import-error">Geen geldige wedstrijden gevonden.</div>';
    return;
  }

  const previewRows = results.map(r => `
    <tr>
      <td>${fmtDate(r.date)}</td>
      <td style="text-align:center;font-weight:700">${r.goalsA} – ${r.goalsB}</td>
      <td style="font-size:12px">${r.playersB.map(id => cache.players.find(p=>p.id===id)?.name||'?').join(', ') || '—'}</td>
      <td style="font-size:12px">${r.scorers.map(s => cache.players.find(p=>p.id===s.playerId)?.name + (s.goals>1?` (${s.goals}×)`:'') ).join(', ') || '—'}</td>
    </tr>`).join('');

  preview.innerHTML = `
    ${errorHtml}
    <div style="font-size:12px;font-weight:700;color:#4caf7d;margin-bottom:10px">✓ ${results.length} wedstrijd(en) klaar om te importeren</div>
    <div class="stats-wrap" style="margin-bottom:14px;overflow-x:auto">
      <table class="stats-table">
        <thead><tr><th>Datum</th><th>Score</th><th>Spelers RoBo</th><th>Scorers</th></tr></thead>
        <tbody>${previewRows}</tbody>
      </table>
    </div>
    <button class="btn btn-gold" id="confirmImportBtn">✓ Importeer ${results.length} wedstrijd(en)</button>
    <button class="btn btn-ghost" id="cancelImportBtn" style="margin-left:10px">Annuleren</button>`;

  // Store parsed results for confirm
  preview._importData = results;

  eid('confirmImportBtn').addEventListener('click', () => doImport(results, preview));
  eid('cancelImportBtn').addEventListener('click', () => { preview.innerHTML = ''; eid('importFileInput').value = ''; eid('importFileName').textContent = 'Geen bestand gekozen'; });
};

const doImport = async (results, preview) => {
  preview.innerHTML = '<div style="color:var(--text-soft);font-size:13px">Bezig met importeren…</div>';
  let imported = 0;
  const failed = [];
  for (const data of results) {
    try {
      const { data: row, error } = await sb.from('matches')
        .insert({ date: data.date, goals_a: data.goalsA, goals_b: data.goalsB, season_id: cache.currentSeasonId })
        .select().single();
      if (error) throw error;
      const mpRows = data.playersB.map(pid => ({ match_id: row.id, player_id: pid, team: 'B' }));
      if (mpRows.length) await sb.from('match_players').insert(mpRows);
      const scRows = data.scorers.map(s => ({ match_id: row.id, player_id: s.playerId, goals: s.goals }));
      if (scRows.length) await sb.from('match_scorers').insert(scRows);
      imported++;
    } catch(e) {
      failed.push(`${data.date}: ${e.message}`);
    }
  }
  await loadAll();
  render();
  const failHtml = failed.length ? `<br><span style="color:#e05a5a;font-size:12px">${failed.length} mislukt: ${failed.join('; ')}</span>` : '';
  notify(`${imported} wedstrijd(en) geïmporteerd!`);
  preview.innerHTML = `<div style="color:#4caf7d;font-size:14px;font-weight:600">✓ ${imported} wedstrijd(en) geïmporteerd!${failHtml}</div>`;
};

  q('.player-check', el => el.addEventListener('click', ()=>{
    el.classList.toggle('selected');
    el.querySelector('.chk-box').textContent = el.classList.contains('selected') ? '✓' : '';
  }));

  eid('addScorerRow')?.addEventListener('click', ()=>{
    const div = document.createElement('div');
    div.innerHTML = scorerRow('', 1);
    eid('scorersList').appendChild(div.firstElementChild);
    wireScorers();
  });
  wireScorers();

  eid('saveMatchBtn')?.addEventListener('click', saveMatch);
  eid('saveSettingsBtn')?.addEventListener('click', saveSettings);
  eid('saveKostenBtn')?.addEventListener('click', saveKosten);
  eid('addExtraBtn')?.addEventListener('click', () => {
    cache.extraCosts = [...cache.extraCosts, { id: Date.now(), description: '', amount: 0 }];
    render();
  });
  document.querySelectorAll('[data-remove-extra]').forEach(b => {
    b.addEventListener('click', () => {
      const i = parseInt(b.dataset.removeExtra);
      cache.extraCosts = cache.extraCosts.filter((_,idx) => idx !== i);
      render();
    });
  });
  document.querySelectorAll('.pay-checkbox').forEach(cb => {
    cb.addEventListener('change', () => togglePayment(cb.dataset.playerId, cb.checked));
  });
};

const wireScorers = () =>
  q('.remove-scorer', b => b.addEventListener('click', ()=>b.closest('.scorer-row').remove()));

// ── ACTIONS ───────────────────────────────────────────
const doLogin = () => {
  if (eid('pwInput')?.value === ADMIN_PASSWORD) {
    S.isAdmin=true; S.loginVisible=false; S.page='admin'; S.adminTab='matches';
    notify('Welkom terug, admin!'); render();
  } else {
    eid('loginError').style.display = 'block';
  }
};

const savePlayer = () => {
  const name = eid('playerNameInput').value.trim();
  if (!name) return;
  const foot = eid('playerFootInput').value;
  const ed = S.editingPlayer;
  S.modal = null; S.editingPlayer = null;
  if (ed) {
    doAction(() => dbUpdatePlayer(ed.id, name, foot), 'Speler bijgewerkt');
  } else {
    doAction(() => dbAddPlayer(name, foot), `${name} toegevoegd`);
  }
};

const saveMatch = () => {
  const data = {
    date:    eid('matchDate').value,
    goalsA:  parseInt(eid('goalsA').value)||0,
    goalsB:  parseInt(eid('goalsB').value)||0,
    playersA: [...document.querySelectorAll('[data-team="A"].selected')].map(e=>e.dataset.pid),
    playersB: [...document.querySelectorAll('[data-team="B"].selected')].map(e=>e.dataset.pid),
    scorers:  []
  };
  document.querySelectorAll('.scorer-row').forEach(row=>{
    const pid=row.querySelector('.scorer-select').value, goals=parseInt(row.querySelector('.scorer-goals').value)||0;
    if (pid && goals>0) data.scorers.push({ playerId:pid, goals });
  });
  const existingId = S.editingMatch?.id || null;
  S.modal = null; S.editingMatch = null;
  doAction(() => dbSaveMatch(data, existingId), 'Wedstrijd opgeslagen');
};

const startNewSeason = async () => {
  const name  = eid('newSeasonNameInput')?.value.trim();
  const start = eid('newSeasonStart')?.value || null;
  const end   = eid('newSeasonEnd')?.value   || null;
  if (!name) { notify('Voer een naam in voor het nieuwe seizoen.'); return; }
  if (!confirm(`Weet je zeker dat je een nieuw seizoen wilt starten?\n\nNaam: ${name}\n\nHet huidige seizoen blijft bewaard.`)) return;

  doAction(async () => {
    // Maak nieuw seizoen aan
    const { data: newSeason, error } = await sb.from('seasons').insert({ name, start_date: start, end_date: end }).select().single();
    if (error) throw error;
    // Nieuw seizoen wordt NIET automatisch huidig — stel handmatig in via Instellingen
    cache.seasons.unshift(newSeason);
    // Reset kosten settings voor nieuw seizoen
    await dbSaveSetting('season', name);
    await dbSaveSetting('season_cost', 0);
    await dbSaveSetting('season_paid', 0);
    await dbSaveSetting('extra_costs', '[]');
    await dbSaveSetting('payments_paid', '[]');
    cache.season = name;
    cache.seasonCost = 0;
    cache.seasonPaid = 0;
    cache.extraCosts = [];
    cache.paymentsPaid = [];
    S.selectedSeasonId = newSeason.id;
    notify(`Nieuw seizoen "${name}" gestart! 🎉`);
    render();
  }, null);
};


const setCurrentSeason = (sid) => {
  if (sid === cache.currentSeasonId) return;
  const s = cache.seasons.find(s => s.id === sid);
  if (!s) return;
  cache.currentSeasonId = sid;
  // Automatisch overschakelen naar dit seizoen
  S.selectedSeasonId = sid;
  doAction(async () => {
    await dbSaveSetting('current_season_id', sid);
    await loadAll();
    render();
  }, `"${s.name}" is nu het huidige seizoen`);
};


const saveSeasonEdit = () => {
  const sid  = S.editingSeason;
  const name  = eid('editSeasonName')?.value.trim();
  const start = eid('editSeasonStart')?.value || null;
  const end   = eid('editSeasonEnd')?.value   || null;
  if (!name || !sid) return;
  doAction(async () => {
    const { error } = await sb.from('seasons').update({ name, start_date: start, end_date: end }).eq('id', sid);
    if (error) throw error;
    // Update lokale cache
    const s = cache.seasons.find(s => s.id === sid);
    if (s) { s.name = name; s.start_date = start; s.end_date = end; }
    // Als dit het actieve seizoen is, update ook de display naam
    if (sid === cache.currentSeasonId) cache.season = name;
    S.editingSeason = null;
  }, 'Seizoen bijgewerkt');
};

const deleteSeasonConfirm = (sid) => {
  const s = cache.seasons.find(s => s.id === sid);
  if (!s) return;
  const matchCount = (cache.allMatchesRaw || []).filter(m => m.season_id === sid).length;
  const warning = matchCount > 0 ? `\n\nLet op: dit seizoen heeft ${matchCount} wedstrijd(en). Die worden ook verwijderd!` : '';
  if (!confirm(`Seizoen "${s.name}" verwijderen?${warning}`)) return;
  doAction(async () => {
    const { error } = await sb.from('seasons').delete().eq('id', sid);
    if (error) throw error;
    cache.seasons = cache.seasons.filter(s => s.id !== sid);
    // Als huidig seizoen verwijderd: switch naar eerste beschikbare
    if (cache.currentSeasonId === sid) {
      cache.currentSeasonId = cache.seasons[0]?.id || null;
      S.selectedSeasonId = cache.currentSeasonId;
    }
    await loadAll();
    render();
  }, 'Seizoen verwijderd');
};

// saveSettings is nu niet meer nodig maar bewaar voor compatibiliteit
const saveSettings = () => {};

const saveKosten = () => {
  const cost = parseFloat(eid('seasonCostInput').value) || 0;
  // Lees huidige extra kosten uit de DOM inputs
  const extraDescInputs = document.querySelectorAll('.extra-desc-input');
  const extraAmtInputs  = document.querySelectorAll('.extra-amt-input');
  const extras = [];
  extraDescInputs.forEach((inp, i) => {
    const amt = parseFloat(extraAmtInputs[i]?.value) || 0;
    if (inp.value.trim() || amt) extras.push({ id: Date.now()+i, description: inp.value.trim(), amount: amt });
  });
  cache.extraCosts = extras;
  doAction(async () => {
    await dbSaveSetting('season_cost', cost);
    await dbSaveSetting('extra_costs', JSON.stringify(extras));
  }, 'Kosten opgeslagen');
};

const togglePayment = (playerId, checked) => {
  let paid = [...cache.paymentsPaid];
  if (checked) { if (!paid.includes(playerId)) paid.push(playerId); }
  else { paid = paid.filter(id => id !== playerId); }
  cache.paymentsPaid = paid;
  doAction(async () => {
    await dbSaveSetting('payments_paid', JSON.stringify(paid));
  }, checked ? 'Betaling geregistreerd ✓' : 'Betaling verwijderd');
  render();
};

// ── CONFIG ERROR ──────────────────────────────────────
const showConfigError = msg => {
  eid('loadingScreen').innerHTML = `
    <div style="text-align:center;padding:40px;max-width:460px">
      <div style="font-size:40px;margin-bottom:16px">⚠️</div>
      <div style="font-family:'DM Serif Display',serif;font-size:22px;color:#f4f8fc;margin-bottom:12px">Verbinding mislukt</div>
      <div style="color:#8aa0bb;font-size:14px;line-height:1.7;margin-bottom:20px">${msg}</div>
      <div style="background:#101f38;border:1px solid #2a4570;border-radius:8px;padding:16px;font-size:13px;color:#8aa0bb;text-align:left">
        Controleer of <code style="color:#e8b85a">SUPABASE_URL</code> en <code style="color:#e8b85a">SUPABASE_ANON_KEY</code>
        correct zijn ingevuld bovenaan in de HTML-code.
      </div>
    </div>`;
};

// ── BOOT ─────────────────────────────────────────────
(async () => {
  const ok = await loadAll();
  if (!ok) return;
  eid('loadingScreen').style.display = 'none';
  eid('app').style.display = 'block';
  render();
})();
</script>
</body>
</html>
